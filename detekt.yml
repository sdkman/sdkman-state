config:
  validation: false

build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
    ignoreAnnotated:
      - 'Test'
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20

style:
  MaxLineLength:
    active: false
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  UseCheckOrError:
    active: false

SdkmanRuleSet:
  NoNullableTypes:
    active: true
