name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: "Build and Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Run tests
        run: |
          ./gradlew test
      - name: Build
        run: |
          ./gradlew build
