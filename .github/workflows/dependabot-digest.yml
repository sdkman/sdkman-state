name: Dependabot Digest

on:
  schedule:
    # 09:00 UTC Tue (Dependabot fires 05:00 UTC same day; 4h window for the batch).
    - cron: "0 9 * * 2"
  workflow_dispatch: {}

jobs:
  digest:
    permissions:
      pull-requests: read
      actions: read
    uses: sdkman/.github/.github/workflows/reusable-dependabot-digest.yml@main
    with:
      pr_ci_workflow: "CI"
    secrets: inherit
