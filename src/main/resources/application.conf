ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ io.sdkman.state.ApplicationKt.module ]
    }
}

database {
    host = "localhost"
    host = ${?DATABASE_HOST}
    port = 5432
    port = ${?DATABASE_PORT}
    username = "postgres"
    username = ${?DATABASE_USERNAME}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
}

admin {
    email = "admin@sdkman.io"
    email = ${?ADMIN_EMAIL}
    password = "changeme"
    password = ${?ADMIN_PASSWORD}
}

jwt {
    secret = ${JWT_SECRET}
    expiry = 3
    expiry = ${?JWT_EXPIRY_MINUTES}
}

api {
    cache.control = 600
}