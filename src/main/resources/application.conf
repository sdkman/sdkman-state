ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ io.sdkman.state.ApplicationKt.module ]
    }
}

database {
    host = "localhost"
    host = ${?DATABASE_HOST}
    port = 5432
    port = ${?DATABASE_PORT}
    username = "postgres"
    username = ${?DATABASE_USERNAME}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}

    pool {
        maxSize = 20
        maxSize = ${?DATABASE_POOL_MAX_SIZE}
        minIdle = 2
        minIdle = ${?DATABASE_POOL_MIN_IDLE}
        connectionTimeoutMs = 5000
        connectionTimeoutMs = ${?DATABASE_POOL_CONNECTION_TIMEOUT_MS}
        maxLifetimeMs = 1800000
        maxLifetimeMs = ${?DATABASE_POOL_MAX_LIFETIME_MS}
        idleTimeoutMs = 600000
        idleTimeoutMs = ${?DATABASE_POOL_IDLE_TIMEOUT_MS}
    }
}

api {
    cache.control = 600
}

admin {
    email = "admin@sdkman.io"
    email = ${?ADMIN_EMAIL}
    password = "changeme"
    password = ${?ADMIN_PASSWORD}
}

jwt {
    secret = ${JWT_SECRET}
    expiry = 10
    expiry = ${?JWT_EXPIRY_MINUTES}
}

validation {
    semverish {
        candidates = "java"
        candidates = ${?SEMVERISH_CANDIDATES}
    }
}